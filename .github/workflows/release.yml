name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# Disable husky in CI: hooks (lint-staged + commitlint) run locally on
# pre-commit / commit-msg, and at PR time via the CI workflow. They must
# stay out of the way of changesets/action, which crafts a non-Conventional
# "Version Packages" commit that would otherwise fail commitlint.
env:
  HUSKY: 0

permissions:
  contents: write
  pull-requests: write
  id-token: write # required for npm provenance + Trusted Publisher OIDC

jobs:
  release:
    name: Version & publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22.13'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Verify (lint • typecheck • test • build)
        run: npm run verify

      # Authenticates to npm via OIDC (Trusted Publisher), not a long-lived
      # token. The publisher is registered at the package level on npm:
      # https://www.npmjs.com/package/@flute-payments/sdk/access
      # Org: aurora-payments · Repo: flute-sdk-typescript · Workflow: release.yml
      # As long as those three match, npm accepts the publish + provenance
      # attestation produced by `id-token: write` above.
      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          version: npm run version-packages
          publish: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
